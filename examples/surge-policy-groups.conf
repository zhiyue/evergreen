kycloud = select, timeout=30s, policy-path=https://YOUR_WORKER/sub/kycloud?token=YOUR_PUBLIC_TOKEN, policy-regex-filter=^(?!.*海外用户).*$, hidden=0, update-interval=3600, external-policy-name-prefix=[kycloud]
ssrdog = select, timeout=30s, policy-path=https://YOUR_WORKER/sub/ssrdog?token=YOUR_PUBLIC_TOKEN, policy-regex-filter=^(?!.*(AnyPath|ASYNCHRONOUS)).*$, hidden=0, update-interval=3600, external-policy-name-prefix=[ssrdog]
yiyuan = select, timeout=30s, policy-path=https://YOUR_WORKER/sub/yiyuan?token=YOUR_PUBLIC_TOKEN, policy-regex-filter=^(?!.*(AnyPath|ASYNCHRONOUS)).*$, hidden=0, update-interval=3600, external-policy-name-prefix=[yiyuan]
jingling = select, timeout=30s, policy-path=https://YOUR_WORKER/sub/jingling?token=YOUR_PUBLIC_TOKEN, policy-regex-filter=^(?!.*(AnyPath|ASYNCHRONOUS)).*$, hidden=0, update-interval=3600, external-policy-name-prefix=[Fallback]
tag = select, timeout=30s, policy-path=https://YOUR_WORKER/sub/tag?token=YOUR_PUBLIC_TOKEN, policy-regex-filter=(?<!\d)(0\.\d+|1)x, hidden=0, update-interval=3600, external-policy-name-prefix=[tag]
tag(家宽) = select, timeout=30s, policy-path=https://YOUR_WORKER/sub/tag?token=YOUR_PUBLIC_TOKEN, policy-regex-filter=家宽, hidden=0, update-interval=3600, external-policy-name-prefix=[tag]
